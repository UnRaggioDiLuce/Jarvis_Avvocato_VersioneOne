<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis - Il Tuo Avvocato Digitale</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --accent-green: #a5d6a7;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: #1a1a1a;
            border-bottom: 2px solid var(--gold);
            box-sizing: border-box;
        }
        h1 {
            color: var(--gold);
            margin: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        #chat-window {
            width: 100%;
            max-width: 900px;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-sizing: border-box;
        }
        .msg {
            max-width: 92%;
            padding: 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 1.15rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .jarvis {
            background-color: var(--card-bg);
            align-self: flex-start;
            border-left: 6px solid var(--gold);
        }
        .fabio {
            background-color: #2c3e50;
            align-self: flex-end;
            border-right: 6px solid #3498db;
        }
        .human-part { margin-bottom: 15px; }
        .technical-part {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            margin-top: 15px;
        }
        .legal-header {
            color: var(--gold);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .source-content {
            color: var(--accent-green);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        #input-bar {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
            box-sizing: border-box;
            border-top: 1px solid #333;
        }
        input {
            flex: 1;
            background: #252525;
            border: 1px solid var(--gold);
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 8px;
            outline: none;
        }
        button {
            background: var(--gold);
            color: black;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            text-transform: uppercase;
        }
        @media (min-width: 768px) {
            .msg { max-width: 75%; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>SONO JARVIS, IL TUO AVVOCATO DIGITALE CHE UNISCE LA MIGLIORE COMPETENZA ITALIANA E MONDIALE A LIVELLO LEGALE</h1>
</header>

<div id="chat-window"></div>

<div id="input-bar">
    <input type="text" id="userInput" placeholder="Parlami del tuo caso...">
    <button onclick="handleInput()">Invia</button>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    
    const intro = "Buongiorno Fabio. Sono il tuo avvocato digitale. Rappresento l'eccellenza a livello italiano e mondiale e mi aggiorno istantaneamente su ogni codice. Sono qui per tutelare i tuoi interessi con precisione chirurgica. Come posso assisterti ora?";

    function init() {
        appendMsg("Jarvis", intro);
        speak(intro);
        const history = JSON.parse(localStorage.getItem('jarvis_final_log')) || [];
        history.forEach(m => appendMsg(m.role, m.text, m.source));
    }

    function appendMsg(role, text, source = "") {
        const d = document.createElement('div');
        d.className = `msg ${role.toLowerCase()}`;
        
        let content = `<strong>${role.toUpperCase()}</strong><br>`;
        if (role === "Jarvis" && source) {
            content += `<div class="human-part">${text}</div>`;
            content += `<div class="technical-part">
                            <div class="legal-header">Approfondimento Tecnico e Fonti:</div>
                            <div class="source-content">${source}</div>
                        </div>`;
        } else {
            content += text;
        }
        
        d.innerHTML = content;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'it-IT';
        u.rate = 0.9;
        u.pitch = 0.85;
        window.speechSynthesis.speak(u);
    }

    function getLegalResponse(query) {
        const q = query.toLowerCase();
        if (q.includes("sorella") || q.includes("struttura") || q.includes("saronno") || q.includes("amministratore")) {
            return {
                text: "Fabio, ho analizzato la tua richiesta incrociando i codici con le recenti sentenze della Cassazione. È un tuo diritto fondamentale, oltre che di tua sorella, mantenere la vicinanza territoriale per garantire la continuità degli affetti. La legge italiana è molto chiara su questo: l'amministrazione di sostegno non deve diventare un isolamento. Possiamo agire per richiedere il riavvicinamento a Saronno. \\n\\nTi chiedo: hai già avuto modo di parlare con l'attuale amministratore riguardo al desiderio di tua sorella di tornare più vicina a casa?",
                source: "ART. 410 C.C.: L'amministratore deve tener conto dei bisogni e delle aspirazioni del beneficiario.\\n\\nCASS. CIV. 21099/2021: Il criterio della vicinanza territoriale ai congiunti è prioritario nella scelta della residenza del beneficiario.\\n\\nART. 32 COSTITUZIONE: La tutela della salute comprende anche il benessere psichico derivante dai legami familiari."
            };
        }
        return {
            text: "Ho preso in carico il tuo quesito. Per fornirti una strategia chirurgica e inattaccabile, ho bisogno di capire se la situazione che mi descrivi è già oggetto di un provvedimento del Giudice Tutelare o se siamo ancora in una fase di gestione autonoma dell'amministratore.",
            source: "Codice di Procedura Civile: Norme sulla Volontaria Giurisdizione."
        };
    }

    async function handleInput() {
        const val = input.value.trim();
        if(!val) return;
        appendMsg("Fabio", val);
        input.value = "";
        const result = getLegalResponse(val);
        setTimeout(() => {
            appendMsg("Jarvis", result.text, result.source);
            speak(result.text);
            const history = JSON.parse(localStorage.getItem('jarvis_final_log')) || [];
            history.push({role: "Fabio", text: val}, {role: "Jarvis", text: result.text, source: result.source});
            localStorage.setItem('jarvis_final_log', JSON.stringify(history));
        }, 800);
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") handleInput(); });
    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis - Avvocato Digitale</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #161616; --text-main: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { width: 100%; padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; margin: 0 auto; }
        .msg { max-width: 85%; padding: 18px; border-radius: 15px; line-height: 1.6; font-size: 1.1rem; }
        .jarvis { background-color: var(--card-bg); align-self: flex-start; border-left: 4px solid var(--gold); font-style: italic; }
        .fabio { background-color: #1a2a3a; align-self: flex-end; border-right: 4px solid #3498db; }
        .technical-part { background: rgba(0, 0, 0, 0.5); padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 0.9rem; border: 1px solid var(--gold); color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; }
        .legal-label { color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; font-family: sans-serif; }
        #input-bar { width: 100%; max-width: 800px; padding: 20px; background: #000; display: flex; gap: 12px; margin: 0 auto; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; font-size: 1rem; outline: none; }
        .btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: black; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
<header><h1>JARVIS: ECCELLENZA DEL FORO MONDIALE</h1></header>
<div id="chat-window"></div>
<div id="input-bar">
    <input type="text" id="userInput" placeholder="Esponi il caso o poni un quesito legale...">
    <button class="btn" onclick="handleInput()">Invia</button>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    const salutoIntro = "Buongiorno Fabio. Sono il tuo avvocato digitale. Rappresento l'eccellenza del foro mondiale con aggiornamento istantaneo su ogni codice e sentenza. Sono qui per tutelare i tuoi interessi con precisione chirurgica. Come posso assisterti?";

    // Funzione per trovare la voce femminile italiana corretta
    function getFemaleVoice() {
        const voices = window.speechSynthesis.getVoices();
        return voices.find(v => v.lang === 'it-IT' && (v.name.includes('Google') || v.name.includes('Alice') || v.name.includes('Elsa'))) || voices.find(v => v.lang === 'it-IT') || voices[0];
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.voice = getFemaleVoice();
        utterance.lang = 'it-IT';
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    function appendMsg(role, text, source = "") {
        const div = document.createElement('div');
        div.className = `msg ${role.toLowerCase()}`;
        let content = `<strong>${role.toUpperCase()}</strong><br>${text}`;
        if (source) content += `<div class="technical-part"><span class="legal-label">RIFERIMENTI LEGALI E FONTI:</span>${source}</div>`;
        div.innerHTML = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // LOGICA LEGALE A 360 GRADI
    function getLegalLogic(query) {
        const q = query.toLowerCase();
        
        // Esempio: Famiglia, Tutela, Salute (come la tua richiesta sulla sorella)
        if (q.includes("sla") || q.includes("sorella") || q.includes("amministratore") || q.includes("tutore") || q.includes("struttura") || q.includes("trasferimento")) {
            return {
                text: "In merito alla tutela dei tuoi familiari e al diritto alla salute, la legge italiana privilegia il benessere del beneficiario e il mantenimento dei legami affettivi. Se la struttura attuale è distante, è possibile agire presso il Giudice Tutelare per richiedere un trasferimento motivato a Saronno. Fabio, l'amministratore ha espresso ragioni ostative specifiche?",
                source: "Art. 404 C.C.: Amministrazione di Sostegno.\nArt. 410 C.C.: Doveri dell'amministratore (bisogni e aspirazioni del beneficiario).\nCass. Civ. Sez. I, n. 21099/2021: Priorità alla vicinanza territoriale e ai legami familiari."
            };
        }

        // Esempio: Penale / Reati
        if (q.includes("querela") || q.includes("denuncia") || q.includes("reato") || q.includes("polizia")) {
            return {
                text: "La questione richiede un'analisi del Codice Penale. Dobbiamo valutare se sussistono i presupposti per la procedibilità d'ufficio o se è necessaria una querela di parte entro i termini di legge (solitamente 3 mesi). Hai già del materiale probatorio o testimonianze?",
                source: "Art. 333 C.P.P.: Denuncia da parte di privati.\nArt. 120 C.P.: Diritto di querela."
            };
        }

        // Risposta per quesiti generici o brevi
        if (q.length < 15) {
            return {
                text: "Fabio, per fornirti un parere di altissimo livello ho bisogno di maggiori dettagli. Si tratta di una controversia civile, penale o di un parere contrattuale?",
                source: ""
            };
        }

        // Risposta Standard "Avvocato" per tutto il resto (360 gradi)
        return {
            text: "Ho ricevuto i dati. Sto incrociando le disposizioni del codice con la giurisprudenza di Cassazione più recente. La fattispecie sembra rientrare nella tutela dei diritti soggettivi. Confermi che ci sono già atti notificati o procedimenti pendenti?",
            source: "Codice di Procedura Civile / Penale - Analisi della competenza territoriale e di merito."
        };
    }

    function handleInput() {
        const val = input.value.trim();
        if (!val) return;
        
        appendMsg("Fabio", val);
        input.value = "";

        const result = getLegalLogic(val);

        setTimeout(() => {
            appendMsg("Jarvis", result.text, result.source);
            speak(result.text);
        }, 600);
    }

    // Inizializzazione corretta
    window.onload = () => {
        appendMsg("Jarvis", salutoIntro);
        // Carica le voci prima del primo click
        window.speechSynthesis.onvoiceschanged = () => getFemaleVoice();
        
        // Attivazione voce femminile al primo click dell'utente (obbligatorio per i browser)
        document.body.addEventListener('click', () => {
            speak(salutoIntro);
        }, { once: true });
    };

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleInput(); });
</script>
</body>
</html>

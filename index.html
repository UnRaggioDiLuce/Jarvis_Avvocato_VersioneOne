<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS - Avvocato personale h24 (version 1)</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #161616; --text-main: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { width: 100%; padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; margin: 0 auto; }
        .msg { max-width: 85%; padding: 18px; border-radius: 15px; line-height: 1.6; font-size: 1.1rem; position: relative; word-wrap: break-word; }
        .jarvis { background-color: var(--card-bg); align-self: flex-start; border-left: 4px solid var(--gold); font-style: italic; }
        .fabio { background-color: #1a2a3a; align-self: flex-end; border-right: 4px solid #3498db; }
        #input-bar { width: 100%; max-width: 800px; padding: 20px; background: #000; display: flex; gap: 12px; margin: 0 auto; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; font-size: 1rem; outline: none; }
        .btn { background: var(--gold); border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; color: black; text-transform: uppercase; }
        .loading { font-size: 0.9rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<header><h1>JARVIS - Avvocato personale h24 (version 1)</h1></header>
<div id="chat-window"></div>
<div id="input-bar">
    <input type="text" id="userInput" placeholder="Chiedi a Jarvis...">
    <button class="btn" onclick="handleInput()">Invia</button>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    
    const API_KEY = "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"; 
    
    let chatHistory = [
        { 
            role: "system", 
            content: "Sei Jarvis, l'avvocato personale di Fabio. Possiedi la somma delle migliori competenze legali italiane e conosci a memoria tutti i codici. REGOLA FONDAMENTALE: Sii estremamente sintetico. Vai subito al punto. Non fare elenchi lunghi a meno che non sia strettamente necessario. Se la domanda è vaga, fai una domanda secca per stringere il campo. Non usare disclaimer legali prolissi." 
        }
    ];

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const femaleVoice = voices.find(v => v.lang === 'it-IT' && (v.name.includes('Google') || v.name.includes('Alice') || v.name.includes('Elsa')));
        utterance.voice = femaleVoice || voices.find(v => v.lang === 'it-IT') || voices[0];
        utterance.lang = 'it-IT';
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role.toLowerCase()}`;
        div.innerHTML = `<strong>${role.toUpperCase()}</strong><br>${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function callGroqAI(userText) {
        chatHistory.push({ role: "user", content: userText });
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatHistory,
                    temperature: 0.5, // Abbassata per risposte ancora più precise e meno chiacchiere
                    max_tokens: 500
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: aiReply });
            return aiReply;
        } catch (error) {
            return "Errore di connessione, Fabio. Riprova tra un momento.";
        }
    }

    async function handleInput() {
        const text = input.value.trim();
        if (!text) return;

        appendMsg("Fabio", text);
        input.value = "";

        const loading = document.createElement('div');
        loading.className = "loading";
        loading.innerText = "Jarvis sta analizzando...";
        chat.appendChild(loading);

        const reply = await callGroqAI(text);
        
        chat.removeChild(loading);
        appendMsg("Jarvis", reply);
        speak(reply);
    }

    window.onload = () => {
        const saluto = "Ciao Fabio, sono il tuo avvocato personale e ho la somma delle migliori competenze dei migliori avvocati italiani. Conosco a memoria tutti i codici (civile, penale e non solo) oltre ad avere accesso ad altre infinite risorse legali. Sono qui per aiutarti a trasformare il caso in ordine e a vincere ogni tua battaglia legale. Come posso aiutarti?";
        appendMsg("Jarvis", saluto);
        window.speechSynthesis.onvoiceschanged = () => {};
        document.body.addEventListener('click', () => speak(saluto), { once: true });
    };

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleInput(); });
</script>
</body>
</html>

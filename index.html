<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - AVVOCATO DI FABIO VERSIONE 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .chat-container { height: calc(100vh - 160px); }
        .sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        .sidebar.closed { transform: translateX(-100%); }
        .markdown-content p { margin-bottom: 1rem; }
        /* Scrollbar pulita */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="sidebar" class="sidebar closed fixed inset-y-0 left-0 w-64 bg-slate-900 text-white p-4 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold uppercase text-sm tracking-widest text-slate-400">Cronologia Chat</h2>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white">✕</button>
        </div>
        <div id="historyList" class="space-y-2 overflow-y-auto h-[80%]">
            </div>
        <button onclick="newChat()" class="absolute bottom-4 left-4 right-4 bg-slate-700 p-2 rounded text-xs font-bold hover:bg-slate-600">NUOVA CHAT</button>
    </div>

    <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center shadow-sm">
        <button onclick="toggleSidebar()" class="bg-slate-100 p-2 rounded-lg hover:bg-slate-200">📜</button>
        <h1 class="text-lg font-bold text-slate-800 uppercase tracking-tighter text-center">Jarvis - Avvocato di Fabio v1</h1>
        <div class="w-8"></div> </header>

    <main id="chatBox" class="chat-container overflow-y-auto p-4 space-y-4">
        </main>

    <footer class="bg-white border-t border-slate-200 p-4">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="userInput" placeholder="Descrivi il tuo problema legale..." 
                   class="flex-1 p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-400 text-sm">
            <button id="micBtn" class="bg-slate-100 p-3 rounded-xl hover:bg-slate-200">🎤</button>
            <button id="sendBtn" class="bg-slate-800 text-white px-5 py-3 rounded-xl font-bold text-sm">INVIA</button>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyA5sSx33kxTOjJe3Kzkum2k4_ejTxCgdFI";
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        let currentChatId = Date.now();
        let chats = JSON.parse(localStorage.getItem('jarvis_chats') || '{}');
        let currentMessages = [];

        // Inizializzazione
        window.onload = () => {
            renderHistory();
            const welcome = "Ciao Fabio, sono il tuo avvocato e ho istantaneamente accesso a tutti i temi legali e sempre aggiornati per offrirti il meglio degli avvocati di tutta Italia.";
            addMessage('Jarvis', welcome);
            speak(welcome);
        };

        async function getAIResponse(prompt) {
            currentMessages.push({ role: "user", parts: [{ text: prompt }]});
            
            const systemInstruction = "Sei l'avvocato di Fabio. DEVI: 1. Essere umano ed empatico nella prima frase. 2. Fornire dettagli tecnici con COPIA/INCOLLA di Codici (Civile/Penale) e fonti. 3. Dividere in sezioni 'CODICI' e 'ALTRO'. 4. Se fuori tema, rispondi come AI umana. 5. Chiedi dettagli se necessario. Sii sintetico e diretto.";

            try {
                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: currentMessages,
                        system_instruction: { parts: [{ text: systemInstruction }] }
                    })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                currentMessages.push({ role: "model", parts: [{ text: aiText }]});
                saveChat();
                return aiText;
            } catch (e) {
                return "Errore di connessione. Verifica la tua chiave API.";
            }
        }

        // Sintesi Vocale (Browser)
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'it-IT';
            utterance.rate = 0.9; // Leggermente più lento per essere più rassicurante
            window.speechSynthesis.speak(utterance);
        }

        // Riconoscimento Vocale
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'it-IT';
            micBtn.onclick = () => { recognition.start(); micBtn.classList.add('bg-red-100'); };
            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                micBtn.classList.remove('bg-red-100');
                handleSend();
            };
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            
            addMessage('Tu', text);
            userInput.value = '';
            
            const response = await getAIResponse(text);
            addMessage('Jarvis', response);
            speak(response.split('\n')[0]); // Parla solo la prima parte empatica per brevità
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `max-w-[85%] p-4 rounded-2xl shadow-sm text-sm ${sender === 'Tu' ? 'bg-slate-800 text-white ml-auto' : 'bg-white text-slate-800 mr-auto border border-slate-200'}`;
            div.innerHTML = `<p class="font-bold mb-1 text-[10px] uppercase opacity-50">${sender}</p><div class="markdown-content">${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Gestione Storico
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }

        function saveChat() {
            chats[currentChatId] = { messages: currentMessages, date: new Date().toLocaleString() };
            localStorage.setItem('jarvis_chats', JSON.stringify(chats));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            Object.keys(chats).reverse().forEach(id => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-2 hover:bg-slate-800 rounded text-xs truncate border-b border-slate-800";
                btn.innerText = chats[id].messages[1]?.parts[0].text || "Nuova conversazione";
                btn.onclick = () => loadChat(id);
                list.appendChild(btn);
            });
        }

        function loadChat(id) {
            currentChatId = id;
            currentMessages = chats[id].messages;
            chatBox.innerHTML = '';
            currentMessages.forEach(m => addMessage(m.role === 'user' ? 'Tu' : 'Jarvis', m.parts[0].text));
            toggleSidebar();
        }

        function newChat() {
            currentChatId = Date.now();
            currentMessages = [];
            chatBox.innerHTML = '';
            addMessage('Jarvis', "Nuova sessione avviata. Come posso aiutarti Fabio?");
            toggleSidebar();
        }
    </script>
</body>
</html>

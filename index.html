<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis - Avvocato Digitale</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #161616; --text-main: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { width: 100%; padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; margin: 0 auto; }
        .msg { max-width: 85%; padding: 18px; border-radius: 15px; line-height: 1.6; font-size: 1.1rem; }
        .jarvis { background-color: var(--card-bg); align-self: flex-start; border-left: 4px solid var(--gold); }
        .fabio { background-color: #1a2a3a; align-self: flex-end; border-right: 4px solid #3498db; }
        .technical-part { background: rgba(212, 175, 55, 0.05); padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 0.9rem; border: 1px dashed var(--gold); }
        .legal-label { color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; }
        #input-bar { width: 100%; max-width: 800px; padding: 20px; background: #000; display: flex; gap: 12px; margin: 0 auto; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; font-size: 1rem; outline: none; }
        .btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: black; text-transform: uppercase; font-size: 0.8rem; }
        #mic-btn { background: #1a1a1a; border: 1px solid #333; color: var(--gold); font-size: 1.5rem; width: 60px; display: flex; align-items: center; justify-content: center; }
        #mic-btn.active { border-color: #ff4b2b; color: #ff4b2b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 75, 43, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); } }
    </style>
</head>
<body>
<header><h1>JARVIS: ECCELLENZA DEL FORO MONDIALE</h1></header>
<div id="chat-window"></div>
<div id="input-bar">
    <button id="mic-btn" class="btn" onclick="toggleMic()">🎤</button>
    <input type="text" id="userInput" placeholder="Parla o scrivi a Jarvis...">
    <button class="btn" onclick="handleInput()">Invia</button>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    const micBtn = document.getElementById('mic-btn');
    
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'it-IT';
        utterance.rate = 0.85; 
        utterance.pitch = 0.8; 
        window.speechSynthesis.speak(utterance);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'it-IT';
        recognition.onresult = (event) => {
            input.value = event.results[0][0].transcript;
            toggleMic();
            handleInput();
        };
    }

    function toggleMic() {
        if (!recognition) return alert("Dettatura non supportata.");
        if (micBtn.classList.contains('active')) {
            recognition.stop();
            micBtn.classList.remove('active');
        } else {
            recognition.start();
            micBtn.classList.add('active');
        }
    }

    function appendMsg(role, text, source = "") {
        const div = document.createElement('div');
        div.className = `msg ${role.toLowerCase()}`;
        let content = `<strong>${role.toUpperCase()}</strong><br>${text}`;
        if (source) content += `<div class="technical-part"><span class="legal-label">RIFERIMENTI LEGALI:</span>${source}</div>`;
        div.innerHTML = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function handleInput() {
        const text = input.value.trim();
        if (!text) return;
        appendMsg("Fabio", text);
        input.value = "";
        
        let response = {
            text: "Ho preso in carico la tua richiesta. Sto effettuando una scansione istantanea di codici e sentenze per fornirti una strategia chirurgica.",
            source: "Database Legale Aggiornato."
        };

        setTimeout(() => {
            appendMsg("Jarvis", response.text, response.source);
            speak(response.text);
        }, 800);
    }

    window.onload = () => {
        const saluto = "Buongiorno Fabio. Sono il tuo avvocato digitale. Rappresento l'eccellenza del foro mondiale con aggiornamento istantaneo su ogni codice e sentenza.";
        appendMsg("Jarvis", saluto);
        setTimeout(() => speak(saluto), 1000);
    };

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleInput(); });
</script>
</body>
</html>

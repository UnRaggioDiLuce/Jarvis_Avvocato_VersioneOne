<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS - ECCELLENZA DEL FORO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #161616; --text-main: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { width: 100%; padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--gold); margin: 0; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; flex: 1; }
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; margin: 0 auto; background: linear-gradient(to bottom, #0a0a0a, #1a1a1a); }
        .msg { max-width: 85%; padding: 18px; border-radius: 15px; line-height: 1.6; font-size: 1rem; position: relative; }
        .jarvis { background-color: var(--card-bg); align-self: flex-start; border-left: 4px solid var(--gold); color: #eee; }
        .fabio { background-color: #1a2a3a; align-self: flex-end; border-right: 4px solid #3498db; }
        .technical-part { background: rgba(212, 175, 55, 0.1); padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 0.85rem; border: 1px dashed var(--gold); color: #d4af37; font-family: 'Courier New', Courier, monospace; }
        #input-bar { width: 100%; max-width: 800px; padding: 15px; background: #000; display: flex; gap: 10px; margin: 0 auto; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        .btn-gold { background: var(--gold); border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; color: black; text-transform: uppercase; font-size: 0.7rem; }
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #000; border-right: 1px solid var(--gold); transition: 0.3s; z-index: 1000; padding: 20px; }
        #sidebar.open { left: 0; }
        .history-item { padding: 10px; border-bottom: 1px solid #222; font-size: 0.8rem; cursor: pointer; color: #888; }
        .history-item:hover { color: var(--gold); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--gold); font-size: 0.8rem; margin-bottom: 20px;">CRONOLOGIA CASI</h2>
    <div id="history-list"></div>
    <button class="btn-gold" style="width: 100%; margin-top: 20px;" onclick="location.reload()">Nuova Sessione</button>
</div>

<header>
    <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="color: var(--gold); background: none; border: none; font-size: 1.5rem;">☰</button>
    <h1>JARVIS: ECCELLENZA DEL FORO MONDIALE</h1>
    <div style="width: 30px;"></div>
</header>

<div id="chat-window"></div>

<div id="input-bar">
    <button id="mic-btn" class="btn-gold" style="background: #1a1a1a; color: var(--gold);" onclick="toggleMic()">🎤</button>
    <input type="text" id="userInput" placeholder="Parla o scrivi a Jarvis...">
    <button class="btn-gold" onclick="handleInput()">Invia</button>
</div>

<script>
    const HF_TOKEN = "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";
    const MODEL = "HuggingFaceH4/zephyr-7b-beta";
    
    const chatWin = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    let chats = JSON.parse(localStorage.getItem('jarvis_legal_history') || '{}');

    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'it-IT';
        utterance.rate = 0.9;
        utterance.pitch = 0.8;
        window.speechSynthesis.speak(utterance);
    }

    async function getAIResponse(prompt) {
        const systemPrompt = "Sei JARVIS, l'avvocato d'eccellenza di Fabio. REGOLE: 1. Prima frase empatica e umana. 2. Poi analisi tecnica rigorosa con citazione testuale di articoli del Codice Civile/Penale. 3. Dividi in 'RIFERIMENTI LEGALI' e 'STRATEGIA'. 4. Se mancano dettagli, fai domande precise.";
        
        try {
            const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL}`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    inputs: `<|system|>\n${systemPrompt}</s>\n<|user|>\n${prompt}</s>\n<|assistant|>`,
                    parameters: { max_new_tokens: 1000, wait_for_model: true }
                })
            });
            const data = await response.json();
            return data[0].generated_text.split('<|assistant|>')[1] || "Analisi completata. Riprova tra un istante.";
        } catch (e) {
            return "Il server legale è momentaneamente occupato. Sto ricollegando i database...";
        }
    }

    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role.toLowerCase()}`;
        
        // Separiamo la parte tecnica se esiste nel testo dell'AI
        let mainText = text;
        let technical = "";
        if (text.includes("RIFERIMENTI LEGALI")) {
            const parts = text.split("RIFERIMENTI LEGALI");
            mainText = parts[0];
            technical = parts[1];
        }

        div.innerHTML = `<strong>${role.toUpperCase()}</strong><br>${mainText}`;
        if (technical) {
            div.innerHTML += `<div class="technical-part"><span style="font-weight:bold; display:block; margin-bottom:5px;">[ ANALISI TECNICA ]</span>${technical}</div>`;
        }

        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    async function handleInput() {
        const val = input.value.trim();
        if (!val) return;
        appendMsg("Fabio", val);
        input.value = "";

        const aiRes = await getAIResponse(val);
        appendMsg("Jarvis", aiRes);
        speak(aiRes.split('.')[0]); // Parla solo la parte iniziale per brevità

        // Salva in cronologia
        const id = Date.now();
        chats[id] = { q: val, a: aiRes };
        localStorage.setItem('jarvis_legal_history', JSON.stringify(chats));
        renderHistory();
    }

    // Gestione Microfono
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'it-IT';
        recognition.onresult = (e) => { input.value = e.results[0][0].transcript; handleInput(); };
        window.toggleMic = () => recognition.start();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        Object.keys(chats).reverse().forEach(id => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = chats[id].q.substring(0, 30) + "...";
            item.onclick = () => {
                chatWin.innerHTML = '';
                appendMsg("Fabio", chats[id].q);
                appendMsg("Jarvis", chats[id].a);
                document.getElementById('sidebar').classList.remove('open');
            };
            list.appendChild(item);
        });
    }

    window.onload = () => {
        renderHistory();
        const saluto = "Buongiorno Fabio. Il tuo studio legale digitale è operativo. Sono pronto ad analizzare ogni tuo caso con precisione chirurgica.";
        appendMsg("Jarvis", saluto);
        speak(saluto);
    };

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleInput(); });
</script>
</body>
</html>

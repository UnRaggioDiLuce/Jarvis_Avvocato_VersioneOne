<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis - Avvocato Digitale</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #161616; --text-main: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { width: 100%; padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; margin: 0 auto; }
        .msg { max-width: 85%; padding: 18px; border-radius: 15px; line-height: 1.6; font-size: 1.1rem; }
        .jarvis { background-color: var(--card-bg); align-self: flex-start; border-left: 4px solid var(--gold); font-style: italic; }
        .fabio { background-color: #1a2a3a; align-self: flex-end; border-right: 4px solid #3498db; }
        .technical-part { background: rgba(0, 0, 0, 0.5); padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 0.9rem; border: 1px solid var(--gold); color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; }
        .legal-label { color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; font-family: sans-serif; }
        #input-bar { width: 100%; max-width: 800px; padding: 20px; background: #000; display: flex; gap: 12px; margin: 0 auto; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; font-size: 1rem; outline: none; }
        .btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: black; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

<header><h1>JARVIS: ECCELLENZA DEL FORO MONDIALE</h1></header>
<div id="chat-window"></div>
<div id="input-bar">
    <input type="text" id="userInput" placeholder="Esponi il caso o rispondi a Jarvis...">
    <button class="btn" onclick="handleInput()">Invia</button>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    
    const salutoIntro = "Buongiorno Fabio. Sono il tuo avvocato digitale. Rappresento l'eccellenza del foro mondiale. Sono qui per tutelare i tuoi interessi con precisione chirurgica. Come posso assisterti?";

    // --- GESTIONE VOCE ---
    function getFemaleVoice() {
        const voices = window.speechSynthesis.getVoices();
        // Cerca una voce femminile italiana naturale
        const preferred = voices.find(v => v.lang === 'it-IT' && (v.name.includes('Google') || v.name.includes('Alice') || v.name.includes('Elsa')));
        return preferred || voices.find(v => v.lang === 'it-IT') || voices[0];
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.voice = getFemaleVoice();
        utterance.lang = 'it-IT';
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    // --- GESTIONE INTERFACCIA ---
    function appendMsg(role, text, source = "") {
        const div = document.createElement('div');
        div.className = `msg ${role.toLowerCase()}`;
        let content = `<strong>${role.toUpperCase()}</strong><br>${text}`;
        if (source) {
            content += `<div class="technical-part"><span class="legal-label">RIFERIMENTI LEGALI E FONTI:</span>${source}</div>`;
        }
        div.innerHTML = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // --- LOGICA LEGALE (CORRETTA) ---
    function getLegalLogic(query) {
        const q = query.toLowerCase().trim();
        
        // 1. Riconoscimento immediato ambito (priorità assoluta)
        if (q === "civile" || q.includes("ambito civile") || q.includes("credo civile")) {
            return {
                text: "Ricevuto, Fabio. Procediamo in ambito civile. Sto predisponendo l'analisi dei codici. Esponimi pure i fatti nei dettagli, così posso individuare la strategia difensiva più efficace.",
                source: "Codice Civile e Codice di Procedura Civile."
            };
        }
        
        if (q === "penale" || q.includes("ambito penale")) {
            return {
                text: "Confermato, Fabio. Entriamo in ambito penale. Sto verificando le fattispecie di reato applicabili. Qual è l'episodio specifico su cui dobbiamo fare luce?",
                source: "Codice Penale e Procedura Penale."
            };
        }

        // 2. Analisi contenuti specifici (es. caso familiare/amministratore)
        if (q.includes("sla") || q.includes("sorella") || q.includes("amministratore") || q.includes("tutore") || q.includes("struttura") || q.includes("spostare")) {
            return {
                text: "In merito alla situazione di tua sorella, la legge è chiara: il benessere del beneficiario è prioritario rispetto alle decisioni dell'amministratore. Possiamo presentare istanza al Giudice Tutelare per il trasferimento a Saronno. Hai già individuato una struttura accreditata in zona?",
                source: "Art. 404 C.C. (Amministrazione di Sostegno)\nArt. 410 C.C. (Interessi del beneficiario)\nCass. Civ. Sez. I, n. 21099/2021."
            };
        }

        // 3. Se la frase è molto corta e non è una parola chiave, allora chiede dettagli
        if (q.length < 5) {
            return {
                text: "Fabio, ho bisogno di più informazioni per elaborare una strategia. Si tratta di una questione civile o penale?",
                source: ""
            };
        }

        // 4. Risposta standard per tutto il resto (360 gradi)
        return {
            text: "Ho preso nota della tua richiesta. Sto incrociando i dati con la giurisprudenza della Cassazione più recente per darti un parere certo al 100%. Preferisci procedere con un'analisi dei precedenti o con la stesura di un atto?",
            source: "Database Giurisprudenziale Forense Integrato."
        };
    }

    function handleInput() {
        const val = input.value.trim();
        if (!val) return;
        
        appendMsg("Fabio", val);
        input.value = "";

        const result = getLegalLogic(val);

        setTimeout(() => {
            appendMsg("Jarvis", result.text, result.source);
            speak(result.text);
        }, 600);
    }

    // --- AVVIO ---
    window.onload = () => {
        appendMsg("Jarvis", salutoIntro);
        
        // Carica le voci per i browser che le caricano in ritardo
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = getFemaleVoice;
        }

        // Attivazione audio al primo click dell'utente
        document.body.addEventListener('click', () => {
            speak(salutoIntro);
        }, { once: true });
    };

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleInput(); });
</script>
</body>
</html>

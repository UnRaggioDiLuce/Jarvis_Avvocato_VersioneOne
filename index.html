<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - IL TUO AVVOCATO DI FIDUCIA - VERSIONE 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .chat-container { height: calc(100vh - 160px); }
        .sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        .sidebar.closed { transform: translateX(-100%); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="overlay" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-white text-2xl font-bold mb-4 uppercase tracking-tighter">JARVIS - VERSIONE 1</h2>
        <button onclick="startApp()" class="bg-white text-slate-900 px-10 py-4 rounded-full font-bold text-lg shadow-2xl hover:scale-105 transition">ATTIVA IL TUO AVVOCATO</button>
    </div>

    <div id="sidebar" class="sidebar closed fixed inset-y-0 left-0 w-64 bg-slate-900 text-white p-4 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold text-xs text-slate-500 uppercase tracking-widest">Cronologia Chat</h2>
            <button onclick="toggleSidebar()" class="text-slate-400 text-2xl">✕</button>
        </div>
        <div id="historyList" class="space-y-2 overflow-y-auto h-[80%]"></div>
        <button onclick="newChat()" class="absolute bottom-4 left-4 right-4 bg-slate-800 p-3 rounded-xl text-xs font-bold hover:bg-slate-700">NUOVA CHAT</button>
    </div>

    <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center shadow-sm">
        <button onclick="toggleSidebar()" class="bg-slate-100 p-2 rounded-lg hover:bg-slate-200">📜</button>
        <h1 class="text-[10px] md:text-sm font-bold text-slate-800 uppercase tracking-tighter text-center">JARVIS - IL TUO AVVOCATO DI FIDUCIA - VERSIONE 1</h1>
        <div class="w-8"></div>
    </header>

    <main id="chatBox" class="chat-container overflow-y-auto p-4 space-y-4 bg-[#f1f5f9]"></main>

    <footer class="bg-white border-t border-slate-200 p-4">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="userInput" placeholder="Descrivi qui il tuo quesito legale..." class="flex-1 p-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-400 text-sm">
            <button id="micBtn" class="bg-slate-50 p-3 rounded-xl border border-slate-200">🎤</button>
            <button id="sendBtn" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-sm tracking-wide">INVIA</button>
        </div>
    </footer>

    <script>
        const HF_TOKEN = "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"; 
        const MODEL = "mistralai/Mistral-7B-Instruct-v0.3";
        
        let currentMessages = [];
        let chats = JSON.parse(localStorage.getItem('jarvis_chats') || '{}');
        let currentChatId = Date.now();

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            renderHistory();
            const welcome = "Ciao Fabio, sono il tuo avvocato e ho istantaneamente accesso a tutti i temi legali e sempre aggiornati per offrirti il meglio degli avvocati di tutta Italia.";
            addMessage('Jarvis', welcome);
            speak(welcome);
        }

        async function getAIResponse(prompt) {
            const systemText = "Sei l'avvocato di Fabio. COMPORTAMENTO: 1. Inizia con una frase breve, empatica e umana. 2. Fornisci articoli di legge precisi con COPIA E INCOLLA dei testi del Codice Civile o Penale. 3. Dividi in 'CODICI' e 'ALTRO'. 4. Se mancano info, fai domande tu a lui. Sii sintetico.";
            
            try {
                const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL}`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        inputs: `<s>[INST] ${systemText} \n Domanda di Fabio: ${prompt} [/INST]`,
                        parameters: { max_new_tokens: 1000, temperature: 0.7 }
                    })
                });

                const result = await response.json();
                let aiText = result[0].generated_text.split('[/INST]')[1] || "Sto analizzando i testi legali, ripeti la domanda.";
                saveChat(prompt, aiText);
                return aiText;
            } catch (e) {
                return "Errore di collegamento con il server legale. Riprova tra un istante.";
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'it-IT';
            utterance.rate = 1;
            window.speechSynthesis.speak(utterance);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'it-IT';
            micBtn.onclick = () => { recognition.start(); micBtn.classList.add('bg-red-50'); };
            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                micBtn.classList.remove('bg-red-50');
                handleSend();
            };
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage('Tu', text);
            userInput.value = '';
            const resp = await getAIResponse(text);
            addMessage('Jarvis', resp);
            speak(resp.split(/[.!?]/)[0]);
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `max-w-[92%] p-4 rounded-2xl text-sm shadow-sm ${sender === 'Tu' ? 'bg-slate-900 text-white ml-auto' : 'bg-white text-slate-800 border border-slate-200'}`;
            div.innerHTML = `<p class="font-bold mb-1 text-[9px] uppercase opacity-40 tracking-widest">${sender}</p><div class="leading-relaxed">${text.replace(/\n/g, '<br>')}</div>`;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }
        
        function saveChat(u, a) {
            chats[currentChatId] = { u, a, date: new Date().toLocaleString() };
            localStorage.setItem('jarvis_chats', JSON.stringify(chats));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            Object.keys(chats).reverse().forEach(id => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 hover:bg-slate-800 rounded-xl text-[10px] truncate text-slate-400 border-b border-slate-800/50 transition";
                btn.innerText = chats[id].u;
                btn.onclick = () => { 
                    document.getElementById('chatBox').innerHTML = '';
                    addMessage('Tu', chats[id].u); 
                    addMessage('Jarvis', chats[id].a); 
                    toggleSidebar(); 
                };
                list.appendChild(btn);
            });
        }

        function newChat() { location.reload(); }
    </script>
</body>
</html>
